# MedVerify evaluation set
# =============================================================================
# Truth model: clinical reality. Cases known to fail because PrimeKG lacks
# a particular alias / edge are tagged `data_gap` so the runner reports two
# numbers — raw accuracy (clinical truth) and system accuracy (excluding
# data_gap rows). The delta is the headroom for SapBERT + PubMed mining.
#
# Each case has:
#   id                   stable identifier
#   text                 the input the user types
#   expected.verdict     SUPPORTED | CONTRADICTED | NOT_FOUND | PARTIAL | UNKNOWN
#   expected.asserted_predicate
#   expected.negated     true if user is denying the relation
#   expected.evidence_predicate (optional) what the KG should hold
#   tags                 bucket + flags (brand_drug, lay_term, data_gap, negation, contradiction, multi_claim)
#   notes                human context
#
# Negation semantics:
#   asserted=True  + KG has it     -> SUPPORTED
#   asserted=True  + KG missing    -> NOT_FOUND
#   asserted=False + KG has it     -> CONTRADICTED  (user denied a real edge)
#   asserted=False + KG missing    -> SUPPORTED     (absence agrees with denial)

