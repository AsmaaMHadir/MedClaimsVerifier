# =============================================================================
# Multi-claim sentences (4 cases): test triple extraction yielding multiple verdicts
# Multi-claim cases use `expected.any_of` to match any single produced claim;
# the harness will verify all listed verdicts appear in the response.
# =============================================================================

- id: MULTI_001
  text: "Patient with Type 2 Diabetes and hypertension takes Metformin and Lisinopril"
  expected:
    verdicts_any:        # at least one claim must match each of these verdicts
      - SUPPORTED
      - SUPPORTED
    asserted_predicates_any:
      - TREATS
      - INTERACTS_WITH
  tags: [multi_claim]
  notes: Should produce multiple TREATS verifications and the drug-drug pair

- id: MULTI_002
  text: "Started Atorvastatin for hyperlipidemia. Reports muscle pain since starting"
  expected:
    verdicts_any:
